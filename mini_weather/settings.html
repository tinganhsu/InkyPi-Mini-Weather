<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<div class="form-group">
    <label for="language" class="form-label">Language:</label>
    <select id="language" name="language" class="form-input">
        <option value="nl">Dutch</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="id">Indonesian</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="es">Spanish</option>
        <option value="zh-TW">Traditional Chinese</option>
    </select>
</div>

<div class="form-group">
    <label for="quickLocation" class="form-label">Quick Location:</label>
    <select id="quickLocation" name="quickLocation" class="form-input">
        <option value="">Select a city...</option>
        <option value="52.3676,4.9041">Amsterdam</option>
        <option value="52.5200,13.4050">Berlin</option>
        <option value="-34.6037,-58.3816">Buenos Aires</option>
        <option value="-6.2088,106.8456">Jakarta</option>
        <option value="51.5074,-0.1278">London</option>
        <option value="40.4168,-3.7038">Madrid</option>
        <option value="40.7128,-74.0060">New York</option>
        <option value="48.8566,2.3522">Paris</option>
        <option value="-22.9068,-43.1729">Rio de Janeiro</option>
        <option value="41.9028,12.4964">Rome</option>
        <option value="-23.5505,-46.6333">São Paulo</option>
        <option value="35.6762,139.6503">Tokyo</option>
    </select>
</div>

<div class="form-group">
    <label class="form-label">Location: </label>
    <div class="form-group">
        <span>Latitude </span>
        <input type="text" id="latitude" name="latitude" class="form-input" />
    </div>
    <div class="form-group">
        <span>Longitude </span>
        <input type="text" id="longitude" name="longitude" class="form-input" />
    </div>
    <button type="button" id="openMap" class="action-button compact">Select Location</button>
</div>

<div class="form-group">
    <label for="weatherProvider" class="form-label">Weather Provider:</label>
    <select id="weatherProvider" name="weatherProvider" class="form-input">
        <option value="OpenMeteo">Open-Meteo</option>
        <option value="OpenWeatherMap">OpenWeatherMap</option>
    </select>

    <label for="units" class="form-label">Units:</label>
    <select id="units" name="units" class="form-input">
        <option value="imperial">Imperial (°F)</option>
        <option value="metric">Metric (°C)</option>
        <option value="standard">Standard (K)</option>
    </select>

    <label for="forecastDays" class="form-label">Forecast Days:</label>
    <select id="forecastDays" name="forecastDays" class="form-input">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
    </select>
</div>

<div class="form-group" id="titleOptionWrapper">
    <label class="form-label">Title:</label>

    <div class="form-group">
        <input type="radio" id="title-location" name="titleSelection" value="location">
        <label for="title-location">Location</label>

        <input type="radio" id="title-custom" name="titleSelection" value="custom">
        <label for="title-custom">Custom</label>
        <input type="text" id="customTitle" name="customTitle" class="form-input" placeholder="Type something..." />
    </div>
</div>

<div class="form-group">
    <label for="showIcons" class="form-label">Show icons:</label>
    <div class="toggle-container">
        <input type="hidden" id="showIconsValue" name="showIcons" value="true">
        <input type="checkbox" id="showIcons" class="toggle-checkbox" checked onclick="document.getElementById('showIconsValue').value = this.checked ? 'true' : 'false';">
        <label for="showIcons" class="toggle-label"></label>
    </div>
    <label for="colorIcons" class="form-label" style="margin-left: 1.5rem;">Colorful icons:</label>
    <div class="toggle-container">
        <input type="hidden" id="colorIconsValue" name="colorIcons" value="false">
        <input type="checkbox" id="colorIcons" class="toggle-checkbox" onclick="document.getElementById('colorIconsValue').value = this.checked ? 'true' : 'false';">
        <label for="colorIcons" class="toggle-label"></label>
    </div>
</div>

<div class="form-group">
    <label for="weatherTimeZone" class="form-label">Time Zone:</label>
    <select id="weatherTimeZone" name="weatherTimeZone" class="form-input">
        <option value="locationTimeZone">Use Location Time Zone</option>
        <option value="localTimeZone">Use Local Time Zone</option>
    </select>
</div>

<div id="mapModal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="closeModal('mapModal')">×</span>
        <h2 id="modalTitle">Select Location</h2>
        <div class="separator"></div>
        <div id="map" style="width: 100%; height: 200px; margin: 10px 0px;"></div>
        <button id="closeMap" class="action-button">Save</button>
    </div>
</div>

<script>
    function updateProviderState() {
        const apiKeyLabel = document.querySelector('.api-key-label');
        const provider = document.getElementById('weatherProvider').value;

        if (apiKeyLabel) {
            apiKeyLabel.style.display = provider === 'OpenMeteo' ? 'none' : '';
        }
    }

    function updateCustomTitleState() {
        const customSelected = document.getElementById('title-custom').checked;
        const customTitle = document.getElementById('customTitle');

        customTitle.disabled = !customSelected;
        if (!customSelected) {
            customTitle.value = customTitle.value || '';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const OSM_TILE_URL = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        const $latitude = document.querySelector('#latitude');
        const $longitude = document.querySelector('#longitude');
        const $openMap = document.querySelector('#openMap');
        const $closeMap = document.querySelector('#closeMap');
        const $weatherProvider = document.querySelector('#weatherProvider');
        const $language = document.querySelector('#language');
        const $quickLocation = document.querySelector('#quickLocation');

        let latitude = Number($latitude.value) || 0;
        let longitude = Number($longitude.value) || 0;
        let zoom = $latitude.value && $longitude.value ? 4.5 : 2.5;
        let selectedTitle = 'location';
        let weatherProvider = 'OpenMeteo';
        let map;
        let marker;

        document.querySelectorAll('input[name="titleSelection"]').forEach((radio) => {
            radio.addEventListener('change', updateCustomTitleState);
        });
        $weatherProvider.addEventListener('change', updateProviderState);

        $openMap.addEventListener('click', () => {
            // Re-read the current latitude/longitude inputs in case the user
            // edited them manually after the page loaded. This ensures the map
            // opens centered on the user-entered coordinates rather than stale
            // values captured on DOMContentLoaded.
            const latInput = document.getElementById('latitude').value;
            const longInput = document.getElementById('longitude').value;
            const parsedLat = Number(latInput);
            const parsedLong = Number(longInput);

            if (Number.isFinite(parsedLat) && Number.isFinite(parsedLong)) {
                latitude = parsedLat;
                longitude = parsedLong;
            }

            // Recompute zoom based on whether coordinates are present
            zoom = (document.getElementById('latitude').value && document.getElementById('longitude').value) ? 4.5 : 2.5;

            openModal('mapModal');
            setTimeout(() => {
                if (!map) {
                    map = L.map('map').setView([latitude, longitude], zoom);
                    L.tileLayer(OSM_TILE_URL).addTo(map);
                    marker = L.marker([latitude, longitude], { draggable: true }).addTo(map);

                    map.on('click', (event) => {
                        marker.setLatLng(event.latlng);
                    });
                } else {
                    map.invalidateSize();
                    map.setView([latitude, longitude], zoom);
                    marker.setLatLng([latitude, longitude]);
                }
            }, 100);
        });

        $closeMap.addEventListener('click', () => {
            const position = marker.getLatLng().wrap();
            latitude = position.lat;
            longitude = position.lng;
            $latitude.value = latitude;
            $longitude.value = longitude;

            // Clear the quick location selection so it doesn't conflict
            // with manually-entered coordinates (selects the empty "Select a city..." option).
            if ($quickLocation) {
                $quickLocation.value = '';
                $quickLocation.dispatchEvent(new Event('change'));
            }

            closeModal('mapModal');
        });

        $quickLocation.addEventListener('change', () => {
            if (!$quickLocation.value) {
                return;
            }

            const [quickLat, quickLong] = $quickLocation.value.split(',').map(Number);
            if (Number.isFinite(quickLat) && Number.isFinite(quickLong)) {
                latitude = quickLat;
                longitude = quickLong;
                // Flag that the coordinates are being set by Quick Location
                // so the input listeners below do not reset it immediately.
                $latitude._settingFromQuickLocation = true;
                $longitude._settingFromQuickLocation = true;
                $latitude.value = quickLat.toFixed(4);
                $longitude.value = quickLong.toFixed(4);
                $latitude._settingFromQuickLocation = false;
                $longitude._settingFromQuickLocation = false;
            }
        });

        // Reset Quick Location to "Select a city..." when the user manually
        // edits either coordinate field, so it doesn't show a stale city name.
        [$latitude, $longitude].forEach((field) => {
            field.addEventListener('input', () => {
                if (field._settingFromQuickLocation) return;
                if ($quickLocation.value !== '') {
                    $quickLocation.value = '';
                }
            });
        });

        if (loadPluginSettings) {
            document.getElementById('language').value = pluginSettings.language || 'en';
            if (!$language.querySelector(`option[value="${pluginSettings.language}"]`)) {
                $language.value = 'en';
            }
            document.getElementById('quickLocation').value = pluginSettings.quickLocation || '';
            if (!$quickLocation.querySelector(`option[value="${pluginSettings.quickLocation}"]`)) {
                $quickLocation.value = '';
            }
            document.getElementById('latitude').value = pluginSettings.latitude || '';
            document.getElementById('longitude').value = pluginSettings.longitude || '';
            document.getElementById('weatherProvider').value = pluginSettings.weatherProvider || 'OpenMeteo';
            document.getElementById('units').value = pluginSettings.units || 'imperial';
            document.getElementById('forecastDays').value = pluginSettings.forecastDays || '4';
            document.getElementById('weatherTimeZone').value = pluginSettings.weatherTimeZone || 'locationTimeZone';

            const showIconsVal = pluginSettings.showIcons;
            const showIconsChecked = showIconsVal === undefined || showIconsVal === null || showIconsVal === 'true' || showIconsVal === true;
            document.getElementById('showIcons').checked = showIconsChecked;
            document.getElementById('showIconsValue').value = showIconsChecked ? 'true' : 'false';

            const colorIconsVal = pluginSettings.colorIcons;
            const colorIconsChecked = colorIconsVal === 'true' || colorIconsVal === true;
            document.getElementById('colorIcons').checked = colorIconsChecked;
            document.getElementById('colorIconsValue').value = colorIconsChecked ? 'true' : 'false';

            selectedTitle = pluginSettings.titleSelection || 'location';
            weatherProvider = pluginSettings.weatherProvider || 'OpenMeteo';
            document.getElementById('customTitle').value = pluginSettings.customTitle || '';
        } else {
            document.getElementById('language').value = 'en';
            document.getElementById('quickLocation').value = '';
            document.getElementById('units').value = 'imperial';
            document.getElementById('weatherTimeZone').value = 'locationTimeZone';
        }

        latitude = Number(document.getElementById('latitude').value) || 0;
        longitude = Number(document.getElementById('longitude').value) || 0;
        zoom = document.getElementById('latitude').value && document.getElementById('longitude').value ? 4.5 : 2.5;

        document.getElementById('weatherProvider').value = weatherProvider;
        document.querySelector(`input[name="titleSelection"][value="${selectedTitle}"]`).checked = true;

        updateProviderState();
        updateCustomTitleState();
    });
</script>
